name: Deploy AgentEmpire

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            set -e

            # Install Docker if not present
            if ! command -v docker &>/dev/null; then
              curl -fsSL https://get.docker.com | sh
              sudo usermod -aG docker ubuntu
            fi

            # Clone or update repo
            if [ -d /opt/agent-empire/.git ]; then
              git -C /opt/agent-empire fetch origin
              git -C /opt/agent-empire reset --hard origin/main
            else
              git clone https://github.com/saifsoub/AgentEmpire /opt/agent-empire
            fi

            cd /opt/agent-empire

            # Create .env.local on first deploy
            if [ ! -f .env.local ]; then
              cat > .env.local <<ENVEOF
ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
COMPOSIO_API_KEY=${{ secrets.COMPOSIO_API_KEY }}
COMPOSIO_USER_ID=saifssss@gmail.com
LINEAR_API_KEY=${{ secrets.LINEAR_API_KEY }}
ENVEOF
            fi

            # Patch critical keys every deploy so rotating secrets takes effect
            sed -i "s|^ANTHROPIC_API_KEY=.*|ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}|" .env.local
            sed -i "s|^COMPOSIO_API_KEY=.*|COMPOSIO_API_KEY=${{ secrets.COMPOSIO_API_KEY }}|" .env.local

            # Deploy (no Traefik on this server)
            docker compose -f docker-compose.simple.yml up -d --build
            docker image prune -f
