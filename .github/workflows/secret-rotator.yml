name: Secret Rotator API Generator

on:
  workflow_dispatch:
    inputs:
      command:
        description: Secret Rotator command to run from GitHub Actions
        required: true
        default: status
        type: choice
        options:
          - status
          - install
          - db-init
          - rotate
          - scheduler-check
      install_method:
        description: Install Secret Rotator from PyPI or source
        required: true
        default: pypi
        type: choice
        options:
          - pypi
          - source
      source_repo:
        description: Source repository used when install_method is source
        required: false
        default: https://github.com/hallucinaut/secret-rotator.git
      provider:
        description: Secret provider for rotate commands
        required: false
        default: aws
      secret_id:
        description: Secret id for rotate commands
        required: false
  schedule:
    - cron: '0 3 * * *'

permissions:
  contents: read

jobs:
  secret-rotator:
    name: Run Secret Rotator from GitHub
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ROTATOR_INSTALL_METHOD: ${{ inputs.install_method || 'pypi' }}
      ROTATOR_SOURCE_REPO: ${{ inputs.source_repo || 'https://github.com/hallucinaut/secret-rotator.git' }}
      ROTATOR_PROVIDER: ${{ inputs.provider || vars.ROTATOR_PROVIDER || 'aws' }}
      ROTATOR_SECRET_ID: ${{ inputs.secret_id }}
      ROTATOR_SCHEDULE_CONFIG: config/secret-rotator-schedule.yaml
      ROTATOR_API_PORT: ${{ vars.ROTATOR_API_PORT || '8080' }}
      ROTATOR_LOG_LEVEL: ${{ vars.ROTATOR_LOG_LEVEL || 'info' }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      VAULT_ADDR: ${{ vars.VAULT_ADDR }}
      VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Materialize GCP credentials when provided
        if: env.GOOGLE_APPLICATION_CREDENTIALS_JSON != ''
        run: |
          set -euo pipefail
          printf '%s' "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > "$RUNNER_TEMP/gcp-credentials.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/gcp-credentials.json" >> "$GITHUB_ENV"

      - name: Run Secret Rotator command
        run: scripts/secret-rotator-github.sh "${{ inputs.command || 'scheduler-check' }}"
