services:
  paperclip:
    build:
      context: .
      dockerfile: Dockerfile.paperclip
    image: paperclip:local
    container_name: paperclip
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://paperclip:paperclip@postgres:5432/paperclip
      - NODE_ENV=production
    ports:
      - "3100:3100"
    volumes:
      - paperclip-data:/root/.paperclip
    networks:
      - traefik
      - internal
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.paperclip.rule=Host(`paperclip.srv1446443.hstgr.cloud`)"
      - "traefik.http.routers.paperclip.entrypoints=web"
      - "traefik.http.services.paperclip.loadbalancer.server.port=3100"

  postgres:
    image: postgres:16-alpine
    container_name: paperclip-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=paperclip
      - POSTGRES_PASSWORD=paperclip
      - POSTGRES_DB=paperclip
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperclip -d paperclip"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  agent-empire:
    build: .
    container_name: agent-empire
    restart: unless-stopped
    env_file: .env.local
    environment:
      - NODE_ENV=production
      - DATA_DIR=/app/var
    volumes:
      - empire-data:/app/var
    networks:
      - traefik
      - internal
    labels:
      - "traefik.enable=true"
      # HTTP
      - "traefik.http.routers.agent-empire.rule=Host(`srv1446443.hstgr.cloud`)"
      - "traefik.http.routers.agent-empire.entrypoints=web"
      - "traefik.http.services.agent-empire.loadbalancer.server.port=3000"
      # HTTPS — uncomment once Traefik has a cert resolver configured
      # - "traefik.http.routers.agent-empire-https.rule=Host(`srv1446443.hstgr.cloud`)"
      # - "traefik.http.routers.agent-empire-https.entrypoints=websecure"
      # - "traefik.http.routers.agent-empire-https.tls.certresolver=letsencrypt"
      # - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      # - "traefik.http.routers.agent-empire.middlewares=redirect-to-https"

volumes:
  empire-data:
  paperclip-data:
  postgres-data:

networks:
  traefik:
    external: true
  internal:
    driver: bridge
