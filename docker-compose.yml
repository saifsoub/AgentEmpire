services:
  agent-empire:
    build: .
    container_name: agent-empire
    restart: unless-stopped
    env_file: .env.local
    environment:
      - NODE_ENV=production
      - DATA_DIR=/app/var
    volumes:
      - empire-data:/app/var
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      # HTTP
      - "traefik.http.routers.agent-empire.rule=Host(`srv1446443.hstgr.cloud`)"
      - "traefik.http.routers.agent-empire.entrypoints=web"
      - "traefik.http.services.agent-empire.loadbalancer.server.port=3000"
      # HTTPS — uncomment once Traefik has a cert resolver configured
      # - "traefik.http.routers.agent-empire-https.rule=Host(`srv1446443.hstgr.cloud`)"
      # - "traefik.http.routers.agent-empire-https.entrypoints=websecure"
      # - "traefik.http.routers.agent-empire-https.tls.certresolver=letsencrypt"
      # - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      # - "traefik.http.routers.agent-empire.middlewares=redirect-to-https"

volumes:
  empire-data:

networks:
  traefik:
    external: true
